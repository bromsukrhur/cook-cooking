<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>냉장고 레시피 파인더</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #FFF5F0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 60px;
      color: #1a1a1a;
    }

    .hero {
      background: linear-gradient(135deg, #FF6B35 0%, #FF9A6C 100%);
      border-radius: 20px;
      padding: 28px 24px;
      text-align: center;
      width: 100%;
      max-width: 600px;
      margin-bottom: 20px;
    }
    .hero-icon { font-size: 40px; margin-bottom: 8px; }
    .hero h1 { color: #fff; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .hero p { color: rgba(255,255,255,0.88); font-size: 14px; }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 600px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .card-label {
      font-size: 13px;
      color: #888;
      margin-bottom: 8px;
      display: block;
    }

    .api-key-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    input[type="text"], input[type="password"], textarea {
      width: 100%;
      border: 1.5px solid #e8e0da;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      color: #1a1a1a;
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, input[type="password"]:focus, textarea:focus {
      border-color: #FF6B35;
      background: #fff;
    }

    .toggle-btn {
      flex-shrink: 0;
      background: #f3ede9;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      color: #555;
      font-family: 'Noto Sans KR', sans-serif;
      transition: background 0.2s;
    }
    .toggle-btn:hover { background: #ead9d0; }

    .api-hint {
      margin-top: 8px;
      font-size: 12px;
      color: #aaa;
    }
    .api-hint a { color: #FF6B35; text-decoration: none; }
    .api-hint a:hover { text-decoration: underline; }

    textarea { resize: none; }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
      min-height: 28px;
    }
    .tag {
      background: #FFF0E8;
      border: 1px solid #FFCFB3;
      color: #CC5522;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 13px;
    }

    .cuisine-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .cuisine-btn {
      background: #f3ede9;
      border: none;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      color: #666;
      font-family: 'Noto Sans KR', sans-serif;
      transition: all 0.2s;
    }
    .cuisine-btn.active {
      background: #FF6B35;
      color: #fff;
    }
    .cuisine-btn:hover:not(.active) { background: #ead9d0; }

    .search-btn {
      width: 100%;
      max-width: 600px;
      background: linear-gradient(135deg, #FF6B35, #FF9A6C);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: opacity 0.2s, transform 0.1s;
      margin-bottom: 16px;
    }
    .search-btn:hover { opacity: 0.92; }
    .search-btn:active { transform: scale(0.98); }
    .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-box {
      display: none;
      width: 100%;
      max-width: 600px;
      background: #FFF5E0;
      border: 1px solid #FFDA99;
      border-radius: 10px;
      padding: 12px 14px;
      color: #996600;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .results { width: 100%; max-width: 600px; }

    .results-title {
      font-size: 13px;
      color: #888;
      margin-bottom: 12px;
    }

    .recipe-card {
      background: #fff;
      border-radius: 16px;
      padding: 18px 20px;
      margin-bottom: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(12px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .recipe-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 12px;
    }
    .recipe-name {
      font-size: 17px;
      font-weight: 700;
      color: #1a1a1a;
    }
    .recipe-meta {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .meta-badge {
      background: #FFF0E8;
      border: 1px solid #FFCFB3;
      color: #CC5522;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
      white-space: nowrap;
    }
    .recipe-desc {
      font-size: 14px;
      color: #555;
      line-height: 1.65;
      margin-bottom: 12px;
    }
    .steps-title {
      font-size: 13px;
      font-weight: 700;
      color: #FF6B35;
      margin-bottom: 8px;
    }
    .steps-list {
      list-style: none;
      padding: 0;
    }
    .steps-list li {
      display: flex;
      gap: 10px;
      font-size: 13px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 6px;
    }
    .step-num {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      background: #FF6B35;
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      margin-top: 1px;
    }

    .section-divider {
      border: none;
      border-top: 1px solid #f0e8e3;
      margin: 12px 0;
    }

    .social-links {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #f0e8e3;
    }
    .social-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Noto Sans KR', sans-serif;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.1s;
      cursor: pointer;
    }
    .social-btn:active { transform: scale(0.97); }
    .social-btn:hover { opacity: 0.85; }
    .youtube-btn {
      background: #FF0000;
      color: #fff;
    }
    .insta-btn {
      background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="hero-icon">🍱</div>
    <h1>냉장고 레시피 파인더</h1>
    <p>있는 재료로 뚝딱! AI가 레시피를 추천해드려요</p>
  </div>

  <!-- API Key 입력 -->
  <div class="card" id="api-key-card">
    <span class="card-label">🔑 Anthropic API 키</span>
    <div class="api-key-row">
      <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." />
      <button class="toggle-btn" onclick="toggleApiKey()">보기</button>
    </div>
    <p class="api-hint">
      API 키는 브라우저 로컬에만 저장되며 외부로 전송되지 않아요.
      키가 없으시면 <a href="https://console.anthropic.com/keys" target="_blank">console.anthropic.com</a>에서 발급받으세요.
    </p>
  </div>
  <div id="api-key-saved" style="display:none; width:100%; max-width:600px; margin-bottom:16px; display:none; align-items:center; justify-content:space-between;">
    <span style="font-size:13px; color:#888;">🔑 API 키 저장됨</span>
    <button class="toggle-btn" onclick="showApiKeyCard()">키 변경</button>
  </div>

  <!-- 재료 입력 -->
  <div class="card">
    <span class="card-label">🥬 냉장고 속 재료를 입력하세요</span>
    <textarea id="ingredients-input" rows="3" placeholder="예: 김치 계란 당근 두부" oninput="parseTags(this.value)"></textarea>
    <div class="tags" id="tags-container"></div>

    <hr class="section-divider" />

    <span class="card-label" style="margin-bottom:4px">음식 종류</span>
    <div class="cuisine-row">
      <button class="cuisine-btn active" data-val="전체" onclick="selectCuisine(this)">🌏 전체</button>
      <button class="cuisine-btn" data-val="한식" onclick="selectCuisine(this)">🇰🇷 한식</button>
      <button class="cuisine-btn" data-val="중식" onclick="selectCuisine(this)">🥢 중식</button>
      <button class="cuisine-btn" data-val="일식" onclick="selectCuisine(this)">🍣 일식</button>
      <button class="cuisine-btn" data-val="양식" onclick="selectCuisine(this)">🍝 양식</button>
    </div>
  </div>

  <button class="search-btn" id="search-btn" onclick="getRecipes()">🔍 레시피 추천받기</button>

  <div class="error-box" id="error-box"></div>
  <div class="results" id="results"></div>

  <script>
    let selectedCuisine = '전체';

    // 로컬스토리지에서 API 키 불러오기
    window.addEventListener('load', () => {
      const saved = localStorage.getItem('anthropic_api_key');
      if (saved) {
        document.getElementById('api-key-input').value = saved;
        document.getElementById('api-key-card').style.display = 'none';
        const savedRow = document.getElementById('api-key-saved');
        savedRow.style.display = 'flex';
      }
    });

    function showApiKeyCard() {
      document.getElementById('api-key-card').style.display = 'block';
      document.getElementById('api-key-saved').style.display = 'none';
    }

    function toggleApiKey() {
      const input = document.getElementById('api-key-input');
      const btn = event.target;
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '숨기기';
      } else {
        input.type = 'password';
        btn.textContent = '보기';
      }
    }

    function parseTags(val) {
      const tags = val.trim().split(/[\s,]+/).filter(t => t.length > 0);
      const c = document.getElementById('tags-container');
      c.innerHTML = tags.map(t => `<span class="tag">${t}</span>`).join('');
    }

    function selectCuisine(btn) {
      document.querySelectorAll('.cuisine-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedCuisine = btn.dataset.val;
    }

    function showError(msg) {
      const box = document.getElementById('error-box');
      box.textContent = '⚠️ ' + msg;
      box.style.display = 'block';
    }
    function hideError() {
      document.getElementById('error-box').style.display = 'none';
    }

    async function getRecipes() {
      const apiKey = document.getElementById('api-key-input').value.trim();
      const input = document.getElementById('ingredients-input').value.trim();

      if (!apiKey) { showError('API 키를 입력해주세요.'); return; }
      if (!input)  { showError('재료를 입력해주세요.'); return; }

      // API 키 로컬 저장
      localStorage.setItem('anthropic_api_key', apiKey);

      hideError();
      const btn = document.getElementById('search-btn');
      btn.textContent = '⏳ 레시피 찾는 중...';
      btn.disabled = true;
      document.getElementById('results').innerHTML = '';

      const cuisine = selectedCuisine === '전체' ? '' : selectedCuisine + ' ';
      const prompt = `재료:${input}\n${cuisine}레시피 3개 추천. JSON만 출력:\n{"recipes":[{"name":"요리명","time":"시간","difficulty":"난이도","description":"1문장","steps":["단계1","단계2","단계3"]}]}`;

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: 700,
            messages: [{ role: 'user', content: prompt }]
          })
        });

        if (!response.ok) {
          const err = await response.json();
          if (response.status === 401) throw new Error('API 키가 올바르지 않아요. 키를 다시 확인해주세요.');
          if (response.status === 429) throw new Error('요청이 너무 많아요. 잠시 후 다시 시도해주세요.');
          throw new Error(err.error?.message || `API 오류 (${response.status})`);
        }

        const data = await response.json();
        let rawText = data.content.map(b => b.type === 'text' ? b.text : '').join('');

        // JSON 파싱 처리
        let jsonStr = rawText.trim()
          .replace(/```json\s*/g, '')
          .replace(/```\s*/g, '')
          .trim();

        const firstBrace = jsonStr.indexOf('{');
        const lastBrace  = jsonStr.lastIndexOf('}');
        if (firstBrace !== -1 && lastBrace !== -1) {
          jsonStr = jsonStr.substring(firstBrace, lastBrace + 1);
        }

        const parsed = JSON.parse(jsonStr);
        const recipes = parsed.recipes || parsed;
        if (!Array.isArray(recipes) || recipes.length === 0) throw new Error('레시피를 찾지 못했어요.');

        displayRecipes(recipes);

      } catch (e) {
        showError(e.message);
      } finally {
        btn.textContent = '🔍 레시피 추천받기';
        btn.disabled = false;
      }
    }

    function displayRecipes(recipes) {
      const container = document.getElementById('results');
      container.innerHTML = `<p class="results-title">✨ 추천 레시피 ${recipes.length}가지</p>`;

      recipes.forEach((r, i) => {
        const steps = Array.isArray(r.steps)
          ? r.steps.map((s, j) => `<li><span class="step-num">${j+1}</span><span>${s}</span></li>`).join('')
          : '';

        const card = document.createElement('div');
        card.className = 'recipe-card';
        card.style.animationDelay = `${i * 0.1}s`;
        const recipeName = r.name || '레시피';
        const ytQuery = encodeURIComponent(recipeName + ' 레시피 만들기');
        const igQuery = encodeURIComponent(recipeName + ' 레시피');
        const ytUrl = `https://www.youtube.com/results?search_query=${ytQuery}`;
        const igUrl = `https://www.instagram.com/explore/search/keyword/?q=${igQuery}`;

        card.innerHTML = `
          <div class="recipe-header">
            <div class="recipe-name">${i + 1}. ${recipeName}</div>
            <div class="recipe-meta">
              ${r.time       ? `<span class="meta-badge">⏱ ${r.time}</span>` : ''}
              ${r.difficulty ? `<span class="meta-badge">⚡ ${r.difficulty}</span>` : ''}
            </div>
          </div>
          <p class="recipe-desc">${r.description || ''}</p>
          ${steps ? `<div class="steps-title">조리 순서</div><ul class="steps-list">${steps}</ul>` : ''}
          <div class="social-links">
            <a class="social-btn youtube-btn" href="${ytUrl}" target="_blank" rel="noopener">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg>
              YouTube
            </a>
            <a class="social-btn insta-btn" href="${igUrl}" target="_blank" rel="noopener">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12 2.2c3.2 0 3.6 0 4.9.1 3.3.1 4.8 1.7 4.9 4.9.1 1.3.1 1.6.1 4.8 0 3.2 0 3.6-.1 4.8-.1 3.2-1.7 4.8-4.9 4.9-1.3.1-1.6.1-4.9.1-3.2 0-3.6 0-4.8-.1-3.3-.1-4.8-1.7-4.9-4.9C2.2 15.6 2.2 15.2 2.2 12c0-3.2 0-3.6.1-4.8C2.4 3.9 4 2.3 7.2 2.3c1.2-.1 1.6-.1 4.8-.1zM12 0C8.7 0 8.3 0 7.1.1 2.7.3.3 2.7.1 7.1.0 8.3 0 8.7 0 12c0 3.3 0 3.7.1 4.9.2 4.4 2.6 6.8 7 7C8.3 24 8.7 24 12 24c3.3 0 3.7 0 4.9-.1 4.4-.2 6.8-2.6 7-7 .1-1.2.1-1.6.1-4.9 0-3.3 0-3.7-.1-4.9C23.7 2.7 21.3.3 16.9.1 15.7 0 15.3 0 12 0zm0 5.8a6.2 6.2 0 1 0 0 12.4A6.2 6.2 0 0 0 12 5.8zm0 10.2a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.4-11.8a1.4 1.4 0 1 0 0 2.8 1.4 1.4 0 0 0 0-2.8z"/></svg>
              Instagram
            </a>
          </div>
        `;
        container.appendChild(card);
      });
    }
  </script>
</body>
</html>
