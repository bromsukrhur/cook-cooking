<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리집 냉장고</title>
  <link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8f6f2;
      --card: #ffffff;
      --accent: #e8633a;
      --text: #1e1a16;
      --sub: #7a7068;
      --border: #e8e0d8;
      --selected: #fff3ee;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      padding-bottom: 140px;
    }

    header {
      background: var(--card);
      padding: 24px 20px 16px;
      border-bottom: 1.5px solid var(--border);
      position: sticky; top: 0; z-index: 50;
    }
    header h1 { font-family: 'Gmarket Sans', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 2px; }
    header p { font-size: 13px; color: var(--sub); }

    .fridge-switcher {
      display: flex; gap: 8px; padding: 12px 16px 0;
      background: var(--card);
    }
    .fridge-switch-btn {
      flex: 1; padding: 10px; border-radius: 12px;
      border: 1.5px solid var(--border); background: #fafaf8;
      font-size: 14px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif;
      color: var(--sub); cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .fridge-switch-btn.active-fridge { background: #e8f4fd; border-color: #3b82f6; color: #1d4ed8; }
    .fridge-switch-btn.active-kimchi { background: #fff0e8; border-color: var(--accent); color: var(--accent); }

    .nav-tabs { display: flex; background: var(--card); border-bottom: 1.5px solid var(--border); }
    .nav-tab {
      flex: 1; padding: 12px; text-align: center;
      font-size: 13px; font-weight: 700; color: var(--sub);
      cursor: pointer; border: none; background: none;
      font-family: 'Noto Sans KR', sans-serif;
      border-bottom: 2.5px solid transparent; transition: all 0.2s;
    }
    .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .cat-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 12px 16px 0; scrollbar-width: none; }
    .cat-scroll::-webkit-scrollbar { display: none; }
    .cat-btn {
      flex-shrink: 0; padding: 7px 16px; border-radius: 20px;
      border: 1.5px solid var(--border); background: var(--card);
      font-size: 13px; font-weight: 500; font-family: 'Noto Sans KR', sans-serif;
      color: var(--sub); cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .section { padding: 14px 16px; }
    .section-title { font-size: 13px; font-weight: 700; color: var(--sub); margin-bottom: 10px; }

    .custom-add {
      background: var(--card); border: 1.5px dashed var(--border);
      border-radius: 14px; padding: 14px; margin-bottom: 14px;
    }
    .custom-add-title { font-size: 13px; font-weight: 700; color: var(--sub); margin-bottom: 10px; }
    .custom-row { display: flex; gap: 8px; }
    .custom-row input {
      flex: 1; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 10px 12px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
      color: var(--text); background: #fafaf8; outline: none; transition: border-color 0.2s;
    }
    .custom-row input:focus { border-color: var(--accent); background: #fff; }
    .custom-add-btn {
      flex-shrink: 0; background: var(--accent); color: #fff; border: none;
      border-radius: 10px; padding: 10px 16px; font-size: 14px; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: opacity 0.2s;
    }
    .custom-add-btn:hover { opacity: 0.88; }

    .ingredient-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .ing-btn {
      background: var(--card); border: 1.5px solid var(--border); border-radius: 14px;
      padding: 10px 6px 8px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
      transition: all 0.18s; display: flex; flex-direction: column;
      align-items: center; gap: 6px; position: relative;
    }
    .ing-btn:active { transform: scale(0.93); }
    .ing-btn.selected { border-color: var(--accent); background: var(--selected); }
    .ing-btn.selected::after {
      content: '✓'; position: absolute; top: 5px; right: 7px;
      font-size: 11px; font-weight: 700; color: var(--accent);
    }
    .ing-btn.in-fridge { opacity: 0.45; }
    .ing-img { width: 52px; height: 52px; border-radius: 10px; object-fit: cover; }
    .ing-no-img {
      width: 52px; height: 52px; border-radius: 10px;
      background: linear-gradient(135deg, #f3ede8, #e8dfd6);
      display: flex; align-items: center; justify-content: center; font-size: 26px;
    }
    .ing-name { font-size: 11px; font-weight: 500; color: var(--text); text-align: center; line-height: 1.3; word-break: keep-all; }

    /* 트레이 */
    .tray-wrap {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: var(--card); border-top: 1.5px solid var(--border);
      padding: 12px 16px 24px; box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    }
    .tray-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .tray-title { font-size: 13px; font-weight: 700; color: var(--sub); }
    .tray-count { background: var(--accent); color: #fff; border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 700; }
    .tray-chips { display: flex; gap: 6px; flex-wrap: wrap; min-height: 30px; margin-bottom: 10px; }
    .tray-chip {
      display: flex; align-items: center; gap: 5px;
      background: var(--selected); border: 1px solid #f0c4b0;
      border-radius: 20px; padding: 4px 10px 4px 8px;
      font-size: 12px; font-weight: 500; color: var(--accent);
      animation: popIn 0.2s ease;
    }
    @keyframes popIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .chip-del { cursor: pointer; font-size: 14px; color: #c0856a; }
    .tray-empty { font-size: 13px; color: #bbb; display: flex; align-items: center; height: 30px; }
    .confirm-btn {
      width: 100%; background: linear-gradient(135deg, #e8633a, #f0845a);
      color: #fff; border: none; border-radius: 14px; padding: 14px;
      font-size: 16px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    }
    .confirm-btn:hover { opacity: 0.92; }
    .confirm-btn:active { transform: scale(0.98); }
    .confirm-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 냉장고 뷰 */
    .fridge-view { display: none; padding: 16px; }
    .fridge-view.show { display: block; }
    .fridge-item {
      background: var(--card); border-radius: 14px; padding: 13px 16px;
      display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04); animation: fadeUp 0.3s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fridge-img { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
    .fridge-no-img {
      width: 44px; height: 44px; border-radius: 10px;
      background: linear-gradient(135deg, #f3ede8, #e8dfd6);
      display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0;
    }
    .fridge-info { flex: 1; }
    .fridge-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
    .fridge-cat { font-size: 12px; color: var(--sub); }
    .fridge-del {
      width: 32px; height: 32px; background: #fef2f2; color: #ef4444;
      border: none; border-radius: 8px; cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .empty-fridge { text-align: center; padding: 48px 20px; color: var(--sub); }
    .empty-fridge .ei { font-size: 52px; margin-bottom: 14px; }

    .add-view { display: block; }
    .add-view.hide { display: none; }

    /* 비밀번호 화면 */
    .lock-screen {
      position: fixed; inset: 0; z-index: 999;
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .lock-screen.hide { display: none; }
    .lock-icon { font-size: 56px; margin-bottom: 16px; }
    .lock-title {
      font-family: 'Gmarket Sans', sans-serif;
      font-size: 22px; font-weight: 700; color: #fff;
      margin-bottom: 6px;
    }
    .lock-sub { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 32px; }
    .pin-dots {
      display: flex; gap: 14px; margin-bottom: 32px;
    }
    .pin-dot {
      width: 16px; height: 16px; border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .pin-dot.filled {
      transform: scale(1.25);
      box-shadow: 0 0 10px rgba(255,255,255,0.5);
    }
    .pin-pad {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; width: 240px;
    }
    .pin-btn {
      background: rgba(255,255,255,0.15);
      border: none; border-radius: 14px;
      padding: 18px; font-size: 22px; font-weight: 700;
      color: #fff; cursor: pointer;
      font-family: 'Gmarket Sans', sans-serif;
      transition: background 0.15s, transform 0.1s;
    }
    .pin-btn:active { background: rgba(255,255,255,0.35); transform: scale(0.93); }
    .pin-btn.del { font-size: 18px; }
    .pin-error {
      margin-top: 16px; font-size: 13px;
      color: #fca5a5; min-height: 20px;
      animation: shake 0.3s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
  </style>
</head>
<body>

<!-- 비밀번호 화면 -->
<div class="lock-screen" id="lock-screen">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">우리집 냉장고 / 김치냉장고</div>
  <div class="lock-sub">비밀번호 4자리를 입력하세요</div>
  <div class="pin-dots">
    <div class="pin-dot" id="dot0"></div>
    <div class="pin-dot" id="dot1"></div>
    <div class="pin-dot" id="dot2"></div>
    <div class="pin-dot" id="dot3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinInput('1')">1</button>
    <button class="pin-btn" onclick="pinInput('2')">2</button>
    <button class="pin-btn" onclick="pinInput('3')">3</button>
    <button class="pin-btn" onclick="pinInput('4')">4</button>
    <button class="pin-btn" onclick="pinInput('5')">5</button>
    <button class="pin-btn" onclick="pinInput('6')">6</button>
    <button class="pin-btn" onclick="pinInput('7')">7</button>
    <button class="pin-btn" onclick="pinInput('8')">8</button>
    <button class="pin-btn" onclick="pinInput('9')">9</button>
    <div></div>
    <button class="pin-btn" onclick="pinInput('0')">0</button>
    <button class="pin-btn del" onclick="pinDelete()">⌫</button>
  </div>
  <div class="pin-error" id="pin-error"></div>
</div>

<header>
  <h1 id="main-title">🧊 우리집 냉장고</h1>
  <p>재료를 눌러 선택하거나 직접 입력하세요</p>
</header>

<div class="fridge-switcher">
  <button class="fridge-switch-btn active-fridge" id="btn-normal" onclick="switchFridge('normal')">🧊 우리집 냉장고</button>
  <button class="fridge-switch-btn" id="btn-kimchi" onclick="switchFridge('kimchi')">🌶️ 김치 냉장고</button>
</div>

<div class="nav-tabs">
  <button class="nav-tab active" onclick="switchTab('add')">➕ 재료 추가</button>
  <button class="nav-tab" id="fridge-tab-btn" onclick="switchTab('fridge')">🥡 내 냉장고</button>
</div>

<div class="add-view" id="add-view">
  <div class="cat-scroll" id="cat-scroll"></div>
  <div class="section">
    <div class="custom-add">
      <div class="custom-add-title">✏️ 목록에 없는 재료 직접 추가</div>
      <div class="custom-row">
        <input type="text" id="custom-input" placeholder="재료 이름 입력 (예: 묵은지, 쌈장...)" />
        <button class="custom-add-btn" onclick="addCustom()">바로 추가</button>
      </div>
    </div>
    <div class="section-title" id="grid-title"></div>
    <div class="ingredient-grid" id="ing-grid"></div>
  </div>
</div>

<div class="fridge-view" id="fridge-view">
  <div id="fridge-list"></div>
</div>

<div class="tray-wrap" id="tray-wrap">
  <div class="tray-header">
    <span class="tray-title">선택한 재료</span>
    <span class="tray-count" id="tray-count">0</span>
  </div>
  <div class="tray-chips" id="tray-chips">
    <span class="tray-empty">재료를 눌러 선택해보세요</span>
  </div>
  <button class="confirm-btn" id="confirm-btn" onclick="confirmAdd()" disabled>냉장고에 넣기 🧊</button>
</div>

<script>
const PIN = '0115';
let pinValue = '';
const DOT_COLORS = ['#ff6b6b', '#ffa94d', '#ffd43b', '#69db7c'];

function pinInput(num) {
  if (pinValue.length >= 4) return;
  pinValue += num;
  const dot = document.getElementById('dot' + (pinValue.length - 1));
  dot.classList.add('filled');
  dot.style.background = DOT_COLORS[pinValue.length - 1];
  if (pinValue.length === 4) {
    setTimeout(() => {
      if (pinValue === PIN) {
        document.getElementById('lock-screen').classList.add('hide');
      } else {
        document.getElementById('pin-error').textContent = '비밀번호가 틀렸어요 😢';
        document.querySelectorAll('.pin-dot').forEach(d => {
          d.classList.remove('filled');
          d.style.background = '';
        });
        pinValue = '';
        setTimeout(() => { document.getElementById('pin-error').textContent = ''; }, 1500);
      }
    }, 100);
  }
}

function pinDelete() {
  if (pinValue.length === 0) return;
  pinValue = pinValue.slice(0, -1);
  const dot = document.getElementById('dot' + pinValue.length);
  dot.classList.remove('filled');
  dot.style.background = '';
  document.getElementById('pin-error').textContent = '';
}

  { id:'식빵', name:'식빵', cat:'grain', emoji:'🍞', img:'https://images.unsplash.com/photo-1509440159596-0249088772ff?w=120&q=80' },
  { id:'냉동만두', name:'냉동만두', cat:'grain', emoji:'🥟', img:null },
  { id:'스파게티면', name:'스파게티면', cat:'grain', emoji:'🍝', img:null },
  { id:'떡', name:'떡', cat:'grain', emoji:'🍡', img:null },
  { id:'간장', name:'간장', cat:'sauce', emoji:'🫙', img:null },
  { id:'된장', name:'된장', cat:'sauce', emoji:'🫙', img:null },
  { id:'고추장', name:'고추장', cat:'sauce', emoji:'🌶️', img:null },
  { id:'참기름', name:'참기름', cat:'sauce', emoji:'🫙', img:null },
  { id:'케찹', name:'케찹', cat:'sauce', emoji:'🍅', img:null },
  { id:'마요네즈', name:'마요네즈', cat:'sauce', emoji:'🫙', img:null },
  { id:'콜라', name:'콜라', cat:'drink', emoji:'🥤', img:null },
  { id:'오렌지주스', name:'오렌지주스', cat:'drink', emoji:'🧃', img:null },
  { id:'맥주', name:'맥주', cat:'drink', emoji:'🍺', img:null },
];

let selected = new Set();
let currentFridge = 'normal'; // 'normal' or 'kimchi'
let fridgeItems = JSON.parse(localStorage.getItem('fridge_normal') || '[]');
let currentCat = 'all';

function switchFridge(type) {
  currentFridge = type;
  fridgeItems = JSON.parse(localStorage.getItem('fridge_' + type) || '[]');
  selected.clear();
  const isKimchi = type === 'kimchi';
  document.getElementById('main-title').textContent = isKimchi ? '🌶️ 김치 냉장고' : '🧊 우리집 냉장고';
  document.getElementById('btn-normal').className = 'fridge-switch-btn' + (isKimchi ? '' : ' active-fridge');
  document.getElementById('btn-kimchi').className = 'fridge-switch-btn' + (isKimchi ? ' active-kimchi' : '');
  document.getElementById('confirm-btn').textContent = isKimchi ? '김치 냉장고에 넣기 🌶️' : '냉장고에 넣기 🧊';
  renderCats(); renderGrid(); renderTray(); renderFridge();
}

function renderCats() {
  document.getElementById('cat-scroll').innerHTML = CATS.map(c =>
    `<button class="cat-btn ${c.id===currentCat?'active':''}" onclick="selectCat('${c.id}')">${c.label}</button>`
  ).join('');
}

function renderGrid() {
  const list = currentCat==='all' ? INGS : INGS.filter(i=>i.cat===currentCat);
  const catLabel = CATS.find(c=>c.id===currentCat)?.label || '전체';
  document.getElementById('grid-title').textContent = `${catLabel} · ${list.length}개`;
  document.getElementById('ing-grid').innerHTML = list.map(ing => {
    const isSel = selected.has(ing.id);
    const inFridge = fridgeItems.some(f=>f.id===ing.id);
    return `<button class="ing-btn ${isSel?'selected':''} ${inFridge&&!isSel?'in-fridge':''}" onclick="toggleSel('${ing.id}')">
      ${ing.img ? `<img class="ing-img" src="${ing.img}" alt="${ing.name}" onerror="this.outerHTML='<div class=ing-no-img>${ing.emoji}</div>'">` : `<div class="ing-no-img">${ing.emoji}</div>`}
      <span class="ing-name">${ing.name}${inFridge?'\n✓냉장고':''}</span>
    </button>`;
  }).join('');
}

function renderTray() {
  document.getElementById('tray-count').textContent = selected.size;
  document.getElementById('confirm-btn').disabled = selected.size === 0;
  const chips = document.getElementById('tray-chips');
  if (selected.size === 0) {
    chips.innerHTML = '<span class="tray-empty">재료를 눌러 선택해보세요</span>';
    return;
  }
  chips.innerHTML = [...selected].map(id => {
    const ing = INGS.find(i=>i.id===id) || {name:id, emoji:'📦'};
    return `<div class="tray-chip">${ing.emoji} ${ing.name}<span class="chip-del" onclick="removeSel('${id}')">×</span></div>`;
  }).join('');
}

function renderFridge() {
  const badge = fridgeItems.length > 0 ? ` (${fridgeItems.length})` : '';
  const label = currentFridge === 'kimchi' ? '🌶️ 김치 냉장고' : '🥡 내 냉장고';
  document.getElementById('fridge-tab-btn').textContent = `${label}${badge}`;
  const list = document.getElementById('fridge-list');
  if (fridgeItems.length === 0) {
    list.innerHTML = `<div class="empty-fridge"><div class="ei">🧊</div><p>냉장고가 비어있어요!<br>재료를 추가해보세요.</p></div>`;
    return;
  }
  list.innerHTML = fridgeItems.map((item,i) => `
    <div class="fridge-item" style="animation-delay:${i*0.04}s">
      ${item.img ? `<img class="fridge-img" src="${item.img}" onerror="this.outerHTML='<div class=fridge-no-img>${item.emoji}</div>'" alt="${item.name}">` : `<div class="fridge-no-img">${item.emoji}</div>`}
      <div class="fridge-info">
        <div class="fridge-name">${item.name}</div>
        <div class="fridge-cat">${CATS.find(c=>c.id===item.cat)?.label||'기타'}</div>
      </div>
      <button class="fridge-del" onclick="removeFromFridge('${item.id}')">🗑️</button>
    </div>`).join('');
}

function selectCat(id) { currentCat=id; renderCats(); renderGrid(); }

function toggleSel(id) {
  selected.has(id) ? selected.delete(id) : selected.add(id);
  renderGrid(); renderTray();
}

function removeSel(id) { selected.delete(id); renderGrid(); renderTray(); }

function confirmAdd() {
  selected.forEach(id => {
    if (!fridgeItems.some(f=>f.id===id)) {
      const ing = INGS.find(i=>i.id===id) || {id, name:id, cat:'other', emoji:'📦', img:null};
      fridgeItems.push({...ing, addedAt:Date.now()});
    }
  });
  selected.clear();
  localStorage.setItem('fridge_' + currentFridge, JSON.stringify(fridgeItems));
  renderGrid(); renderTray(); renderFridge();
  switchTab('fridge');
}

function addCustom() {
  const val = document.getElementById('custom-input').value.trim();
  if (!val) return;
  if (!fridgeItems.some(f=>f.name===val)) {
    fridgeItems.push({id:'custom_'+Date.now(), name:val, cat:'other', emoji:'📦', img:null, addedAt:Date.now()});
    localStorage.setItem('fridge_' + currentFridge, JSON.stringify(fridgeItems));
  }
  document.getElementById('custom-input').value = '';
  renderFridge(); switchTab('fridge');
}

function removeFromFridge(id) {
  fridgeItems = fridgeItems.filter(f=>f.id!==id);
  localStorage.setItem('fridge_' + currentFridge, JSON.stringify(fridgeItems));
  renderFridge(); renderGrid();
}

function switchTab(tab) {
  const isAdd = tab==='add';
  document.getElementById('add-view').classList.toggle('hide', !isAdd);
  document.getElementById('fridge-view').classList.toggle('show', !isAdd);
  document.getElementById('tray-wrap').style.display = isAdd ? 'block' : 'none';
  document.querySelectorAll('.nav-tab').forEach((t,i) => t.classList.toggle('active', isAdd ? i===0 : i===1));
}

document.getElementById('custom-input').addEventListener('keydown', e => { if(e.key==='Enter') addCustom(); });

renderCats(); renderGrid(); renderTray(); renderFridge();
</script>
</body>
</html>
